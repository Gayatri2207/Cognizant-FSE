<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Community Portal</title>
    <style>
        .eventImage {
            border: 3px solid rgb(232, 253, 1);
            width: 150px;
            height: 100px;
        }
    </style>
</head>
<body>
    <table border="1">
        <tr>
            <td>
                <img src="event1.jpg" alt="Music Event"
                    title="Music Event" class="eventImage">
                <p>Music Festival</p>
            </td>

            <td>
                <img src="event2.jpg" alt="Food Event"
                    title="Food Event" class="eventImage">
                <p>Food Carnival</p>
            </td>

            <td>
                <img src="event3.jpg" alt="Sports Event"
                    title="Sports Event" class="eventImage">
                <p>Sports Meet</p>
            </td>
        </tr>

        <tr>
            <td>
                <img src="event4.jpg" alt="Dance Event"
                    title="Dance Event" class="eventImage">
                <p>Dance Show</p>
            </td>

            <td>
                <img src="event5.jpg" alt="Book Fair"
                    title="Book Fair" class="eventImage">
                <p>Book Fair</p>
            </td>

            <td>
                <img src="event6.jpg" alt="Art Event"
                    title="Art Event" class="eventImage">
                <p>Art Exhibition</p>
            </td>
        </tr>

    </table>
</body>
</html>
